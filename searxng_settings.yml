# By: Christopher Gray  |  Version: 0.0.28  |  Updated: 7/11/2026
# Change the key to some random string! - Use BitWarden or some other source to generate 40+ chars stings
# download:  wget https://raw.githubusercontent.com/c2theg/ai/refs/heads/main/searxng_settings.yml && cp searxng_settings.yml /opt/models/searxng/settings.yml
#
#---------------------------------------------------------------------------------
# In OpenWebUI: Admin Settings → Web Search →
#   Enable Web Search: on
#   Engine: searxng
#   Searxng Query URL:
#     http://<host>:8080/search?q=<query>&format=json
#   The literal <query> placeholder must be there — OpenWebUI substitutes it.
#---------------------------------------------------------------------------------

use_default_settings: true

server:
  secret_key: "${SECRET}"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"


ui:
  static_use_hash: true
  default_locale: ""
  query_in_title: false
  infinite_scroll: false
  center_alignment: false
  # Custom category tabs (order shown in the UI). Bang-query any of these,
  # e.g.  !security log4j   |   !ai gpt-5   |   !finance rate cut
  categories_as_tabs:
    general:
    news:
    tech:
    ai:
    security:
    finance:
    it:
    science:
    videos:
    sports:
    weather:


search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json


enabled_plugins:
  - Basic Calculator
  - Hash plugin
  - Self Informations
  - Tracker URL remover
  - Hostnames plugin
  - Open Metrics
  - Unit converter plugin
  - Tor check plugin


