#
# For documentation of all options, see:
#   https://www.mongodb.com/docs/manual/reference/configuration-options/
#   https://www.mongodb.com/docs/manual/administration/production-notes/
#
# Tuning goals (this revision): scalability, memory efficiency, stability,
# security-ready. Auth is OPTIONAL and DISABLED by default — see the Security
# block at the bottom for how to turn it on.
#
#----------------- replication ------------------------------------- https://www.mongodb.com/docs/manual/reference/configuration-options/#mongodb-setting-replication.replSetName
replication:
  replSetName: "mongo_ai_us_prod1"
  # Oplog sized for AI batch/back-fill bursts so secondaries can fall behind
  # during heavy ingest without falling off the oplog and needing a full resync.
  # 10 GB is a reasonable floor; raise if ingest spikes outrun replication.
  oplogSizeMB: 10000

#------------------ storage ---------------------------------------- https://www.mongodb.com/docs/manual/reference/configuration-options/#storage-options
storage:
  #dbPath: /var/lib/mongodb  # default; set per-host at container start (paths differ per server)
  wiredTiger:
    engineConfig:
      # ----------------------------------------------------------------
      # CACHE — the single most important AI knob.
      #
      # 8.x default if unset: max(50% of (RAM - 1GB), 256MB).
      #
      # The old value here was cacheSizeGB: 1, which starves the working set
      # for vector/embedding and aggregation workloads. Pick ONE of the two
      # options below (you cannot set both):
      #
      #   * cacheSizePct  — NEW in 8.x, container-memory aware. Best when this
      #                     mongod has a host (or cgroup mem limit) to itself.
      #   * cacheSizeGB   — explicit hard cap. Use this when MULTIPLE mongod
      #                     containers share one host (e.g. this cluster
      #                     co-resides with the ai_audio_transcript DB), so
      #                     they don't collectively oversubscribe RAM.
      #
      # Default below is a conservative explicit cap. On a dedicated/ample host,
      # comment cacheSizeGB and uncomment cacheSizePct instead.
      # ----------------------------------------------------------------
      cacheSizeGB: 4
      # cacheSizePct: 50
      # journalCompressor: snappy   # default; zstd trades CPU for smaller journal
    # collectionConfig:
    #   blockCompressor: zstd       # on-disk collection compression; zstd is the
    #                               # best size/CPU balance for embedding arrays.
    #                               # NOTE: only applies to NEW collections.

#-------------------- network interfaces --------------------------- https://www.mongodb.com/docs/manual/reference/configuration-options/#net-options
net:
  bindIp: 0.0.0.0   # or explicitly include the Tailscale IP for tighter exposure
#  port: 27019 # Defined in Dockerfile
#  ipv6: false
  # 8.1+ default on Linux is (RLIMIT_NOFILE / 2) * 0.8, and any value you set is
  # CAPPED to that. Raising ulimit -n (LimitNOFILE) is what actually lifts the
  # ceiling. 10000 is fine for a connection-pooled AI app tier.
  maxIncomingConnections: 10000
  compression:
    # Order = negotiation preference. zstd first: best compression ratio for
    # large/embedding-heavy payloads at modest CPU; snappy as a low-CPU
    # fallback; zlib last (highest CPU, kept only for old-client compat).
    compressors: zstd,snappy,zlib

#------------------ System / logging ------------------------------- https://www.mongodb.com/docs/manual/reference/configuration-options/#systemlog-options
systemLog:
  #destination: file
  #logAppend: true
  #path: "/var/log/mongodb/mongod_cluster.log"
  traceAllExceptions: false
  logRotate: rename
  verbosity: 0
  quiet: true
  # NEW in 8.0 — surface queries rejected by query settings / load shedding,
  # useful for spotting throttled AI batch jobs. 0 = off, raise to 1 to log.
  # component:
  #   query:
  #     rejected:
  #       verbosity: 1

processManagement:
  timeZoneInfo: /usr/share/zoneinfo
#   fork: true

#------------------ tuned parameters ------------------------------- https://www.mongodb.com/docs/manual/reference/parameters/
setParameter:
  # Reduce session timeout from default 30 min to 5 min (frees server-side
  # session state faster under high short-lived connection churn).
  localLogicalSessionTimeoutMinutes: 5
  # NOTE on storage-engine concurrency: do NOT pin
  # wiredTigerConcurrentReadTransactions / ...WriteTransactions on 8.x.
  # 7.0+ auto-tunes these via dynamic concurrency control; hard-coding them
  # disables the auto-scaler and usually hurts throughput. Left unset on purpose.

#----------------- HOST-LEVEL (not in this file, but required for 8.x perf) ----
# These are OS settings, set on each node — listed here as a checklist:
#   * Transparent Huge Pages: ENABLE on 8.0+ (reversed from the old 7.x guidance).
#   * vm.swappiness = 1   * net.ipv4.tcp_keepalive_time = 120
#   * XFS filesystem, SSD/NVMe, ulimit -n raised (see maxIncomingConnections).

#----------------- Security ---------------------------------------- https://www.mongodb.com/docs/manual/administration/security-checklist/
# AUTH IS OPTIONAL AND DISABLED BY DEFAULT (relies on the trusted Tailscale
# network for isolation). To ENABLE authenticated + encrypted intra-cluster auth:
#
#   1. Generate a shared keyfile (once), copy the SAME file to every member:
#        openssl rand -base64 756 > /etc/mongodb/keys/mongo-key
#        chmod 400 /etc/mongodb/keys/mongo-key
#        chown <mongod-user> /etc/mongodb/keys/mongo-key   # e.g. 999 in container
#   2. Before flipping authorization on, create an admin user while auth is OFF:
#        use admin
#        db.createUser({user:"admin", pwd:"<secret>",
#                       roles:[{role:"root", db:"admin"}]})
#   3. Uncomment the block below and restart each member (rolling restart:
#      secondaries first, then step down and restart the primary).
#   4. Apps must then connect with credentials + authSource=admin.
#
#security:
#  authorization: enabled        # turns ON role-based access control
#  keyFile: /etc/mongodb/keys/mongo-key   # also enables intra-cluster auth
